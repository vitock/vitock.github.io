        async function decrypt (key0,isCached){

            if(isCached){

            }
            else{

            function setKey(value){

                var arr = new Uint8Array(value)
                var b64 = base64js.encode(arr)
                return localStorage.setItem(key,b64)
            }
            function clearKey() {
